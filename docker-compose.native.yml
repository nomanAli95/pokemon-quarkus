services:
  db:
    image: nomanali95/pokemon-postgres:latest
    container_name: pokedex-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ash -d pokedex"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.native
    container_name: pokemon-quarkus-native
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/pokedex
      QUARKUS_DATASOURCE_USERNAME: ash
      QUARKUS_DATASOURCE_PASSWORD: pikachu
    depends_on:
      db:
        condition: service_healthy